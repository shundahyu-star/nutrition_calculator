<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macro Chef</title>
    <style>
        :root {
            --bg: #f5f7f9;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --accent: #ff4b4b;
            --border: #e0e0e0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }
.container {
            max-width: 1100px;
            margin: 0 auto;
        }
        h1, h2, h3 { margin-top: 0; }
        
        .dashboard {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .dashboard { grid-template-columns: 1fr; }
        }

        .panel {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            height: fit-content;
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input[type="range"] { width: 100%; accent-color: var(--accent); }
        select, input[type="number"] {
            width: 100%; padding: 8px; border: 1px solid var(--border);
            border-radius: 5px; box-sizing: border-box; font-size: 14px;
        }
        .slider-val { float: right; color: var(--accent); font-weight: bold; }
        button {
            width: 100%; background-color: var(--accent); color: white;
            border: none; padding: 12px; border-radius: 5px; font-size: 16px;
            font-weight: bold; cursor: pointer; transition: background 0.2s;
        }
        button:hover { background-color: #e04040; }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .metric-card {
            background: var(--card-bg); padding: 15px; border-radius: 10px;
            text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border-bottom: 4px solid var(--accent);
        }
        .metric-title { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;}
        .metric-value { font-size: 24px; font-weight: bold; margin-top: 5px; }

        .meals-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        @media (max-width: 900px) {
            .meals-grid { grid-template-columns: 1fr; }
        }
        .meal-card {
            background: var(--card-bg); padding: 20px; border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid var(--accent);
        }
        .meal-time { font-size: 12px; color: var(--accent); font-weight: bold; text-transform: uppercase; margin-bottom: 2px;}
        .meal-title { font-size: 18px; font-weight: bold; margin-bottom: 5px;}
        .meal-macros { font-size: 13px; color: var(--text-muted); margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--border);}
        .ingr-list { list-style-type: none; padding: 0; margin: 0; font-size: 14px;}
        .ingr-list li { margin-bottom: 5px; display: flex; justify-content: space-between;}
    </style>
</head>
<body>

<div class="container">
    <h1>🍎 Personal Macro & Meal Dashboard</h1>
    <div class="dashboard">
        <div class="panel">
            <h2>User Profile</h2>
            <div class="form-group">
                <label>Age <span class="slider-val" id="ageVal">25</span></label>
                <input type="range" id="age" min="15" max="80" value="25">
            </div>
            <div class="form-group">
                <label>Gender</label>
                <select id="gender">
                    <option value="m">Male</option>
                    <option value="f">Female</option>
                </select>
            </div>
            <div class="form-group">
                <label>Weight (kg) <span class="slider-val" id="weightVal">70</span></label>
                <input type="range" id="weight" min="40" max="150" value="70">
            </div>
            <div class="form-group">
                <label>Height (cm) <span class="slider-val" id="heightVal">175</span></label>
                <input type="range" id="height" min="140" max="220" value="175">
            </div>
            <div class="form-group">
                <label>Activity Level</label>
                <select id="activity">
                    <option value="1.2">Sedentary (Office job)</option>
                    <option value="1.375">Lightly Active (1-3 days/wk)</option>
                    <option value="1.55">Moderately Active (3-5 days/wk)</option>
                    <option value="1.725">Very Active (6-7 days/wk)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Goal</label>
                <select id="goal">
                    <option value="cut">Cut (Weight Loss)</option>
                    <option value="maintain" selected>Maintain</option>
                    <option value="bulk">Bulk (Muscle Gain)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Dietary Preference</label>
                <select id="diet">
                    <option value="standard">Standard</option>
                    <option value="vegetarian">Vegetarian</option>
                    <option value="vegan">Vegan</option>
                </select>
            </div>
            <button id="generateBtn">🔄 Generate Different Meals</button>
        </div>
        <div>
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-title">Target Calories</div>
                    <div class="metric-value" id="outCals">0</div>
                </div>
                <div class="metric-card">
                    <div class="metric-title">Protein</div>
                    <div class="metric-value" id="outP">0g</div>
                </div>
                <div class="metric-card">
                    <div class="metric-title">Carbs</div>
                    <div class="metric-value" id="outC">0g</div>
                </div>
            </div>

            <div class="meals-grid" id="mealContainer">
                </div>
            </div>
    </div>
</div>
